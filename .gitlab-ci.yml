.gpg_signing_setup:
  script:
    - export GNUPGHOME="/dev/shm/ws-gnupg-${CI_JOB_ID}"
    - |
      if [ -n "${LINUX_SIGNING_GPG_KEY_ID:-}" ]; then
        LINUX_SIGNING_GPG_KEY_ID=$(printf '%s' "$LINUX_SIGNING_GPG_KEY_ID" | tr -d '[:space:]')
        export LINUX_SIGNING_GPG_KEY_ID
        if ! printf '%s' "$LINUX_SIGNING_GPG_KEY_ID" | grep -qE '^[0-9a-fA-F]{40}!?$'; then
            echo "LINUX_SIGNING_GPG_KEY_ID must be a 40-char hex fingerprint (got: $LINUX_SIGNING_GPG_KEY_ID)" >&2
            exit 1
        fi
      fi
      if [ -n "${LINUX_SIGNING_GPG_PRIVATE_KEY:-}" ]; then
        mkdir -m 700 "$GNUPGHOME"
        echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
        echo "pinentry-mode loopback" > "$GNUPGHOME/gpg.conf"
        echo "$LINUX_SIGNING_GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
      fi
  after_script:
    - rm -rf "/dev/shm/ws-gnupg-${CI_JOB_ID:-unknown}"

.build_linux_installer_common:
  script:
    - !reference [.download_dependencies_posix, script]
    - if [ -d ./${BUILD_LIBS_FOLDER}/ ]; then for z in ./${BUILD_LIBS_FOLDER}/*.zip; do unzip -qod ./${BUILD_LIBS_FOLDER} $z; done; fi
    - VERSION=$(cmake -P cmake/print_version.cmake 2>&1)

