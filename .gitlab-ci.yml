  artifacts:
    paths:
      - build/temp/
      - build/src/installer/
    expire_in: 1 day
  needs:
    - job: build:win:x64:installer
      optional: true
      artifacts: true
  rules:
    - if: $BUILD_WIN == "y" && ($CI_COMMIT_TAG != null || $CI_COMMIT_BRANCH != null) && $NIGHTLY_TEST_BUILD != "y"

sign:win:arm64:installer:
  <<: *template_win10_sign
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - tools/build_all --sign-installer --arm64 --ci-mode
  artifacts:
    paths:
      - build/temp/
      - build/src/installer/
    expire_in: 1 day
  needs:
