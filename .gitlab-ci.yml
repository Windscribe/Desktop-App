build:win:arm64:installer:
  <<: *template_win_build_app
  variables:
    OS_IDENTIFIER: "windows-arm64"
    BUILD_LIBS_FOLDER: "$BUILD_LIBS_FOLDER_ARM64"
    ARCH_FLAG: "--arm64"
    BUILD_FLAG: "--build-installer"
  artifacts:
