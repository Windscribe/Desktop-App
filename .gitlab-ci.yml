test:translations:
  <<: *template_win10_build
  stage: Test
  variables:
    GIT_STRATEGY: clone
  script:
    - $Unfinished = Select-String -Path src\client\frontend\gui\translations\*,src\installer\gui\installer-gui-common\translations\*,src\installer\gui\windows\uninstaller\translations\*,src\windscribe-cli\translations\* -Pattern 'type="unfinished"'
    - if ( $Unfinished.Matches.Count -ne 0 ) { echo "You have untranslated strings in your ts files.  Run the translation script on the ts files and add them to the commit."; exit 1 }
    - $Vanished = Select-String -Path src\client\frontend\gui\translations\*,src\installer\gui\installer-gui-common\translations\*,src\installer\gui\windows\uninstaller\translations\*,src\windscribe-cli\translations\* -Pattern 'type="vanished"'
    - if ( $Vanished.Matches.Count -ne 0 ) { echo "You have vanished strings in your ts files.  Run the translation script on the ts files with --remove-vanished and add them to the commit."; exit 1 }
  needs: []
  rules:
    - if: $BUILD_WIN == "y"

test:version:mac:
  <<: *template_mac_build
  stage: Test
  variables:
    GIT_STRATEGY: clone
  script:
    - |
      git fetch
      HELPER_CHANGES=$(git diff --name-only origin/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME -- src/helper/macos src/helper/common)
      if [ ! -z "$HELPER_CHANGES" ] && [[ ! "$HELPER_CHANGES" == *"src/helper/macos/helper-info.plist"* ]]; then
        echo "Files in src/helper/macos or src/helper/common were changed, but src/helper/macos/helper-info.plist was not updated"
        exit 1
      fi
      EXTENSION_CHANGES=$(git diff --name-only origin/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME -- src/splittunneling/macos)
      if [ ! -z "$EXTENSION_CHANGES" ] && [[ ! "$EXTENSION_CHANGES" == *"src/splittunneling/macos/Info.plist"* ]]; then
        echo "Files in src/splittunneling/macos were changed, but src/splittunneling/macos/Info.plist was not updated"
        exit 1
      fi
  needs: []
  rules:
    - if: $BUILD_MAC == "y" && $CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == null && $NIGHTLY_TEST_BUILD != "y"

test:linux:package_permissions:
  tags: [linux-arm64-qt6]
  image: registry.gitlab.int.windscribe.com:5005/ws/client/desktop/client-desktop/ubuntu-aarch64
  stage: Test
  variables:
    GIT_STRATEGY: clone
  needs:
    - "build:aarch64_ubuntu:installer"
    - "build:aarch64_ubuntu_cli:installer"
    - "build:rhel:installer"
    - "build:rhel_cli:installer"
    - "build:archlinux:installer"
    - "build:archlinux_cli:installer"
  script:
    - export PATH=${RHEL_CMAKE_BUILD_PATH}/bin:$PATH
    - if ! command -v rpm >/dev/null || ! command -v zstd >/dev/null; then apt-get update -qq && apt-get install -y -qq rpm zstd; fi
    - VERSION=$(cmake -P cmake/print_version.cmake 2>&1)
    - mkdir -p pkgs
    - |
      for spec in \
        "linux-arm64/windscribe_${VERSION}_arm64.deb" \
        "linux-arm64/windscribe_${VERSION}_arm64_fedora.rpm" \
        "linux-arm64/windscribe-cli_${VERSION}_arm64.deb" \
        "linux-arm64/windscribe-cli_${VERSION}_arm64_fedora.rpm" \
        "linux/windscribe_${VERSION}_amd64.deb" \
        "linux/windscribe_${VERSION}_amd64_fedora.rpm" \
        "linux/windscribe_${VERSION}_amd64_opensuse.rpm" \
        "linux/windscribe-cli_${VERSION}_amd64.deb" \
        "linux/windscribe-cli_${VERSION}_amd64_fedora.rpm" \
        "linux/windscribe-cli_${VERSION}_amd64_opensuse.rpm" \
        "linux/windscribe_${VERSION}_amd64.pkg.tar.zst" \
        "linux/windscribe-cli_${VERSION}_amd64.pkg.tar.zst"; do
        curl --silent --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert tools/cacert.pem \
          -o "pkgs/$(basename "$spec")" "${NEXUS_PATH_BRANCH_UPLOAD}/${spec}"
      done
    - |
      status=0
      for pkg in pkgs/*; do
        # Normalize each tool's listing to "MODE OWNER GROUP PATH".
        case "$pkg" in
          *.deb)         listing=$(dpkg-deb -c "$pkg" | awk '{split($2,o,"/"); print $1, o[1], o[2], $NF}');;
          *.rpm)         listing=$(rpm -qlvp "$pkg" | awk '{print $1, $3, $4, $NF}');;
          *.pkg.tar.zst) listing=$(tar --zstd -tvf "$pkg" | awk '{split($2,o,"/"); print $1, o[1], o[2], $NF}');;
          *) continue;;
        esac
        # Fail non-symlink entries that are group/world-writable (catches 0777, 0775, ...) or not owned by root:root.
        # Skip symlinks and Arch package metadata (.PKGINFO/.MTREE/.BUILDINFO/...), which pacman never installs to disk.
        bad=$(echo "$listing" | awk 'substr($1,1,1)=="l"||$4~/^\.(PKGINFO|MTREE|BUILDINFO|INSTALL|CHANGELOG)$/{next} (substr($1,6,1)=="w"||substr($1,9,1)=="w"){print "writable",$1,$4} ($2!="root"&&$2!="0")||($3!="root"&&$3!="0"){print "owner",$2"/"$3,$4}')
        if [ -n "$bad" ]; then
          echo "FAIL: $pkg"; echo "$bad"; status=1
        else
          echo "OK:   $pkg"
        fi
      done
      exit $status
  rules:
    - if: $BUILD_LINUX == "y" && $BUILD_LINUX_ARM64 == "y" && $BUILD_LINUX_CLI == "y" && $CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH != null && $NIGHTLY_TEST_BUILD != "y"

build:nightly:win:
  <<: *template_win10_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
    VCPKG_ROOT: '%VCPKG_ROOT_WINDOWS%'
  script:
    - Set-Variable -name OS_IDENTIFIER -value "windows"
    - !reference [.download_dependencies_win, script]
    - 'IF(Test-Path .\$BUILD_LIBS_FOLDER\) {Get-ChildItem .\$BUILD_LIBS_FOLDER\*.zip | Foreach {.\tools\bin\7z.exe x $_.FullName -o"$BUILD_LIBS_FOLDER\"}}'
    - tools/build_all --ci-mode --build-tests
    - ctest --test-dir build -L client-desktop --output-on-failure
  artifacts:
    paths:
      - build/temp/
    expire_in: 1 day
  rules:
    - if: $BUILD_WIN == "y" && $NIGHTLY_TEST_BUILD == "y"

build:nightly:mac:
  <<: *template_mac_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - OS_IDENTIFIER="macos"
    - !reference [.build_mac_installer_common, script]
    - tools/build_all --ci-mode --build-tests
    - ctest --test-dir build -L client-desktop --output-on-failure
  artifacts:
    paths:
      - build/src/helper/macos/com.windscribe.helper.macos
    expire_in: 1 day
  rules:
    - if: $BUILD_MAC == "y" && $NIGHTLY_TEST_BUILD == "y"

build:nightly:rhel:
  <<: *template_rhel_build
  stage: Build
  variables:
    GIT_STRATEGY: clone
  script:
    - OS_IDENTIFIER="linux"
    - !reference [.build_linux_installer_common, script]
    - python3 -m pip install "clang-tidy<21"
    - tools/build_all --ci-mode --static-analysis --build-tests
    - ctest --test-dir build -L client-desktop --output-on-failure
  rules:
    - if: $BUILD_LINUX == "y" && $NIGHTLY_TEST_BUILD == "y"